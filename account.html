<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Your Account | FloorAqua</title>
  <meta name="description" content="Manage your FloorAqua account and view your order history.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script> 
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    
    #pageContainer { opacity: 0; transition: opacity 0.4s ease-out; }
    #pageContainer.visible { opacity: 1; }
    
    .loader { border: 3px solid #e5e7eb; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Active Sidebar Tab Styling */
    .sidebar-tab-active { border-left-width: 4px; border-color: #4f46e5; background-color: #f8fafc; color: #4f46e5; font-weight: 700; }
  </style>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen text-gray-800">

  <div id="toastNotification" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-md shadow-xl z-[120] transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px] font-medium text-sm flex items-center gap-3">
    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <span id="toastMessage">Saved!</span>
  </div>

  <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-2 flex flex-wrap items-center justify-between">
      
      <div class="flex justify-between items-center w-full lg:w-auto">
        <a href="index.html" class="flex items-center gap-2 lg:gap-3 group">
          <img src="flooraqua.png" alt="FloorAqua Logo" class="h-10 lg:h-12 w-auto object-contain bg-white rounded-full p-1 shadow-sm transition-transform group-hover:scale-105">
          <span class="text-xl lg:text-2xl font-extrabold tracking-tight text-white">FloorAqua</span>
        </a>
        <div class="flex lg:hidden">
          <button onclick="window.location.href='tel:+916398138894'" class="bg-white/20 font-semibold py-1.5 px-4 rounded-md text-sm transition">
            Call Support
          </button>
        </div>
      </div>

      <nav class="w-full lg:w-auto flex flex-wrap items-center text-sm font-medium justify-center gap-4 lg:gap-8 mt-2 lg:mt-0 text-indigo-100 overflow-x-auto no-scrollbar pb-1 lg:pb-0">
        <a href="index.html" class="hover:text-white transition whitespace-nowrap">Home</a>
        <a href="product.html" class="hover:text-white transition whitespace-nowrap">Products</a>
        <a href="about.html" class="hover:text-white transition whitespace-nowrap">About</a>
        <a href="contact.html" class="hover:text-white transition whitespace-nowrap">Contact</a>
      </nav>

      <div class="hidden lg:flex items-center gap-4">
        <button onclick="window.location.href='product.html'" class="inline-flex items-center justify-center bg-white text-indigo-700 font-bold py-2 px-5 rounded-md shadow hover:bg-gray-100 transition-all gap-2 text-sm">
          Shop Now
        </button>
      </div>
    </div>
  </header>

  <div id="pageContainer" class="flex-grow container mx-auto px-4 py-6 lg:py-8 max-w-7xl hidden">
    
    <div class="flex flex-col lg:flex-row gap-6">
      
      <div class="w-full lg:w-1/4 flex flex-col gap-4">
        
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 flex items-center gap-4">
          <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center border border-indigo-200 overflow-hidden shrink-0">
            <img id="userAvatar" src="" alt="Avatar" class="w-full h-full object-cover hidden">
            <span class="text-xl font-bold text-indigo-600" id="userInitial"></span>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-gray-500 font-medium">Hello,</p>
            <h2 class="text-base font-bold text-gray-900 truncate" id="userDisplayName">User</h2>
            <p id="userEmailDisplay" class="text-xs text-gray-500 truncate hidden">email</p>
          </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
          <button onclick="switchTab('orders')" id="tab-orders" class="w-full text-left px-5 py-4 text-sm font-medium text-gray-700 hover:bg-gray-50 border-b border-gray-100 transition sidebar-tab-active flex items-center justify-between group">
            <span class="flex items-center gap-3">
              <svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
              Your Orders
            </span>
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
          
          <button onclick="switchTab('address')" id="tab-address" class="w-full text-left px-5 py-4 text-sm font-medium text-gray-700 hover:bg-gray-50 border-b border-gray-100 transition flex items-center justify-between group border-l-4 border-transparent">
            <span class="flex items-center gap-3">
              <svg class="w-5 h-5 text-gray-400 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              Delivery Addresses
            </span>
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>

          <button id="logoutBtn" class="w-full text-left px-5 py-4 text-sm font-medium text-red-600 hover:bg-red-50 transition flex items-center gap-3">
            <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Sign Out
          </button>
        </div>
      </div>

      <div class="w-full lg:w-3/4">
        
        <div id="view-orders" class="block">
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 lg:p-6 mb-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-200 pb-4 mb-4 gap-4">
              <h1 class="text-xl font-bold text-gray-900">Your Orders</h1>
              
              <div class="flex bg-gray-100 p-1 rounded-md overflow-x-auto no-scrollbar snap-x">
                <button onclick="filterOrders('All')" id="flt-All" class="snap-start px-4 py-1.5 rounded text-xs font-semibold bg-white text-gray-900 shadow-sm shrink-0">All</button>
                <button onclick="filterOrders('Pending')" id="flt-Pending" class="snap-start px-4 py-1.5 rounded text-xs font-medium text-gray-600 hover:text-gray-900 shrink-0">Pending</button>
                <button onclick="filterOrders('Shipped')" id="flt-Shipped" class="snap-start px-4 py-1.5 rounded text-xs font-medium text-gray-600 hover:text-gray-900 shrink-0">Shipped</button>
                <button onclick="filterOrders('Cancelled')" id="flt-Cancelled" class="snap-start px-4 py-1.5 rounded text-xs font-medium text-gray-600 hover:text-gray-900 shrink-0">Cancelled</button>
              </div>
            </div>

            <div id="ordersContainer" class="space-y-4 min-h-[200px] relative">
              </div>
          </div>
        </div>

        <div id="view-address" class="hidden">
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 lg:p-6 relative">
            <div id="profileLoadingState" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/90 transition-opacity duration-300">
              <div class="loader mb-2"></div>
              <p class="text-xs text-indigo-600 font-semibold">Loading Address...</p>
            </div>

            <div class="border-b border-gray-200 pb-4 mb-5 flex justify-between items-end">
              <div>
                <h1 class="text-xl font-bold text-gray-900">Your Addresses</h1>
                <p id="addressSummaryText" class="text-sm text-gray-500 mt-1">Manage where your FloorAqua products arrive.</p>
              </div>
            </div>
            
            <form id="profileForm" class="space-y-4">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                  <label class="text-xs font-bold text-gray-700">Full Name</label>
                  <input type="text" id="profName" required class="w-full p-2.5 text-sm border border-gray-300 rounded focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition">
                </div>
                <div class="space-y-1">
                  <label class="text-xs font-bold text-gray-700">Mobile Number</label>
                  <input type="tel" id="profPhone" pattern="[0-9]{10}" maxlength="10" required class="w-full p-2.5 text-sm border border-gray-300 rounded focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
              </div>
              
              <div class="space-y-1">
                <label class="text-xs font-bold text-gray-700">Flat, House no., Building, Company, Apartment</label>
                <input type="text" id="profStreet" required class="w-full p-2.5 text-sm border border-gray-300 rounded focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition">
              </div>
              
              <div class="space-y-1">
                <label class="text-xs font-bold text-gray-700">Landmark</label>
                <input type="text" id="profLandmark" placeholder="E.g. near apollo hospital" class="w-full p-2.5 text-sm border border-gray-300 rounded focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition">
              </div>
              
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-1 relative">
                  <label class="text-xs font-bold text-gray-700">Pincode</label>
                  <input type="tel" id="profPincode" pattern="[0-9]{6}" maxlength="6" required class="w-full p-2.5 text-sm border border-gray-300 rounded focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition" oninput="this.value = this.value.replace(/[^0-9]/g, ''); if(this.value.length === 6) fetchProfileLocation(this.value);">
                  <span id="profPincodeLoader" class="hidden absolute right-3 top-8 text-xs font-bold text-indigo-600">Checking...</span>
                </div>
                <div class="space-y-1">
                  <label class="text-xs font-bold text-gray-700">Town/City</label>
                  <input type="text" id="profDistrict" required class="w-full p-2.5 text-sm border border-gray-200 rounded bg-gray-50 text-gray-600 cursor-not-allowed outline-none" readonly>
                </div>
                <div class="space-y-1">
                  <label class="text-xs font-bold text-gray-700">State</label>
                  <input type="text" id="profState" required class="w-full p-2.5 text-sm border border-gray-200 rounded bg-gray-50 text-gray-600 cursor-not-allowed outline-none" readonly>
                </div>
              </div>

              <div class="pt-4 border-t border-gray-100 mt-6">
                <button type="submit" id="saveProfileBtn" class="bg-indigo-600 text-white hover:bg-indigo-700 font-bold py-2.5 px-6 rounded shadow-sm transition text-sm flex items-center gap-2">
                  Save Address
                </button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="container mx-auto px-4 py-6 text-center">
      <p class="text-sm text-gray-500">© 2026 FloorAqua — Premium Cleaning Solutions</p>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    // FIREBASE CONFIGURATION (Untouched)
    const firebaseConfig = {
      apiKey: "AIzaSyCx_gDD74ZnTeIhWHSG42ExK67fUQaNNQE",
      authDomain: "flooraqua-2e835.firebaseapp.com",
      projectId: "flooraqua-2e835",
      storageBucket: "flooraqua-2e835.firebasestorage.app",
      messagingSenderId: "591654459926",
      appId: "1:591654459926:web:1d9d8615ee4e71c39df337"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydy_55_wyhjkIMxHQb8jgf8teDqql0TkK2yrGXXM-rqG_G3CqC9uRm5Y-Ps4DT8J_j/exec"; 
    window.currentUserEmail = "";
    window.globalOrdersList = [];
    window.currentOrderFilter = 'All';

    // UI Tab Switcher
    window.switchTab = function(tabName) {
      // Hide all views
      document.getElementById('view-orders').classList.add('hidden');
      document.getElementById('view-address').classList.add('hidden');
      
      // Reset sidebar styling
      document.getElementById('tab-orders').className = "w-full text-left px-5 py-4 text-sm font-medium text-gray-700 hover:bg-gray-50 border-b border-gray-100 transition flex items-center justify-between group border-l-4 border-transparent";
      document.getElementById('tab-address').className = "w-full text-left px-5 py-4 text-sm font-medium text-gray-700 hover:bg-gray-50 border-b border-gray-100 transition flex items-center justify-between group border-l-4 border-transparent";
      
      // Show requested view & style active tab
      document.getElementById('view-' + tabName).classList.remove('hidden');
      document.getElementById('tab-' + tabName).classList.add('sidebar-tab-active');
      document.getElementById('tab-' + tabName).classList.remove('border-transparent');
    };

    // AUTHENTICATION LISTENER
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.currentUserEmail = user.email;
        
        document.getElementById('userEmailDisplay').textContent = user.email;
        if (user.displayName) {
          document.getElementById('userDisplayName').textContent = user.displayName;
        } else {
          document.getElementById('userDisplayName').textContent = user.email.split('@')[0];
        }
        
        if (user.photoURL) {
          document.getElementById('userAvatar').src = user.photoURL;
          document.getElementById('userAvatar').classList.remove('hidden');
          document.getElementById('userInitial').classList.add('hidden');
        } else {
          document.getElementById('userInitial').textContent = user.email.charAt(0).toUpperCase();
        }

        const container = document.getElementById('pageContainer');
        container.classList.remove('hidden');
        setTimeout(() => container.classList.add('visible'), 50);

        loadSavedProfile(); 
        window.fetchUserOrders();
      } else {
        window.location.replace("login.html");
      }
    });

    // LOGOUT
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await signOut(auth);
        localStorage.removeItem('floorAquaSavedAddress'); 
        window.location.href = "login.html";
      } catch (error) {
        console.error("Logout Error:", error);
      }
    });

    // ADDRESS LOGIC
    function updateAddressSummaryText(profile) {
      const summaryText = document.getElementById('addressSummaryText');
      if (profile && profile.street && profile.district) {
        summaryText.innerHTML = `Saved Address: <b>${profile.street}, ${profile.district} - ${profile.pincode}</b>`;
      } else {
        summaryText.innerText = "Add a new address for faster checkout.";
      }
    }

    async function loadSavedProfile() {
      const loaderOverlay = document.getElementById('profileLoadingState');
      if (loaderOverlay) { loaderOverlay.style.display = 'flex'; loaderOverlay.style.opacity = '1'; }

      try {
        const response = await fetch(GOOGLE_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: "getUserProfile", email: window.currentUserEmail })
        });
        const data = await response.json();
        
        if (data.result === "success" && data.profile) {
          document.getElementById('profName').value = data.profile.name || '';
          document.getElementById('profPhone').value = data.profile.phone || '';
          document.getElementById('profStreet').value = data.profile.street || '';
          document.getElementById('profLandmark').value = data.profile.landmark || '';
          document.getElementById('profPincode').value = data.profile.pincode || '';
          document.getElementById('profDistrict').value = data.profile.district || '';
          document.getElementById('profState').value = data.profile.state || '';
          localStorage.setItem('floorAquaSavedAddress', JSON.stringify(data.profile));
          
          updateAddressSummaryText(data.profile);
        } else {
          updateAddressSummaryText(null);
        }
      } catch (e) { 
        console.error("Cloud fetch failed", e); 
        updateAddressSummaryText(null); 
      } finally {
        if (loaderOverlay) {
          loaderOverlay.style.opacity = '0';
          setTimeout(() => loaderOverlay.style.display = 'none', 300);
        }
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveProfileBtn');
      btn.innerHTML = `<div class="loader mr-2 !w-4 !h-4 !border-white !border-t-transparent !border-2"></div> Saving...`;
      btn.disabled = true;

      const profileData = {
        name: document.getElementById('profName').value.trim(),
        phone: document.getElementById('profPhone').value.trim(),
        street: document.getElementById('profStreet').value.trim(),
        landmark: document.getElementById('profLandmark').value.trim(),
        pincode: document.getElementById('profPincode').value.trim(),
        district: document.getElementById('profDistrict').value.trim(),
        state: document.getElementById('profState').value.trim()
      };

      try {
        const response = await fetch(GOOGLE_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: "saveUserProfile", email: window.currentUserEmail, profile: profileData })
        });
        const data = await response.json();
        if(data.result === "success") {
           localStorage.setItem('floorAquaSavedAddress', JSON.stringify(profileData));
           updateAddressSummaryText(profileData);
           window.showToast("Address Saved!");
        }
      } catch(e) { alert("Network error. Please try again."); }
      
      btn.innerHTML = "Save Address";
      btn.disabled = false;
    });

    // ORDERS LOGIC - AMAZON STYLE CARDS
    window.fetchUserOrders = async function() {
      const container = document.getElementById('ordersContainer');
      container.innerHTML = `<div class="flex flex-col items-center justify-center py-10 bg-gray-50 rounded-md border border-gray-100"><div class="loader !border-gray-300 !border-t-indigo-600 mb-2"></div><p class="text-sm text-gray-500">Fetching orders...</p></div>`;
      
      try {
        const response = await fetch(GOOGLE_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: "getUserOrders", email: window.currentUserEmail })
        });
        const data = await response.json();
        if (data.result === "success") {
          window.globalOrdersList = data.orders || [];
          window.filterOrders(window.currentOrderFilter);
        }
      } catch (error) { 
        container.innerHTML = `<div class="text-center py-8 text-red-500 font-medium text-sm">Failed to load orders.</div>`; 
      }
    };

    window.filterOrders = function(status) {
      window.currentOrderFilter = status;
      
      document.querySelectorAll('[id^="flt-"]').forEach(btn => {
        btn.className = "snap-start px-4 py-1.5 rounded text-xs font-medium text-gray-600 hover:text-gray-900 shrink-0";
      });
      
      const activeBtn = document.getElementById('flt-' + status);
      if(activeBtn) {
        activeBtn.className = "snap-start px-4 py-1.5 rounded text-xs font-semibold bg-white text-gray-900 shadow-sm shrink-0";
      }

      window.renderOrders();
    }

    window.renderOrders = function() {
      const container = document.getElementById('ordersContainer');
      let ordersToRender = window.globalOrdersList;
      
      if (window.currentOrderFilter !== 'All') {
        if (window.currentOrderFilter === 'Pending') {
          ordersToRender = window.globalOrdersList.filter(o => o.status === 'Pending' || o.status === 'Packed');
        } else {
          ordersToRender = window.globalOrdersList.filter(o => o.status === window.currentOrderFilter);
        }
      }

      if (!ordersToRender || ordersToRender.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 border border-gray-200 rounded-lg bg-gray-50">
            <p class="text-gray-600 font-medium text-sm mb-3">No ${window.currentOrderFilter !== 'All' ? window.currentOrderFilter.toLowerCase() : ''} orders found.</p>
            <button onclick="window.location.href='product.html'" class="bg-white border border-gray-300 text-gray-700 font-semibold py-1.5 px-4 rounded shadow-sm text-sm hover:bg-gray-50">Continue Shopping</button>
          </div>`;
        return;
      }

      container.innerHTML = ""; 
      ordersToRender.forEach(order => {
        let statusBadge = '';
        let cancelBtn = '';
        let statusColor = 'text-gray-500';

        if(order.status === "Pending" || order.status === "Packed") {
           statusBadge = `Preparing for Dispatch`;
           statusColor = 'text-amber-600';
           cancelBtn = `<button onclick="cancelOrder('${order.orderId}')" class="text-sm font-medium border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 py-1.5 px-4 rounded w-full sm:w-auto shadow-sm transition">Cancel Order</button>`;
        } else if(order.status === "Shipped") {
           statusBadge = `Out for Delivery 🚚`;
           statusColor = 'text-blue-600';
           cancelBtn = `<button class="text-sm font-medium border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 py-1.5 px-4 rounded w-full sm:w-auto shadow-sm transition">Track Package</button>`;
        } else if(order.status === "Delivered") {
           statusBadge = `Delivered`;
           statusColor = 'text-green-700';
           cancelBtn = `<button class="text-sm font-medium border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 py-1.5 px-4 rounded w-full sm:w-auto shadow-sm transition">Buy it again</button>`;
        } else if(order.status === "Cancelled") {
           statusBadge = `Cancelled`;
           statusColor = 'text-red-600';
        }

        // Amazon-style horizontal card structure
        container.innerHTML += `
          <div class="border border-gray-200 rounded-lg bg-white overflow-hidden mb-4">
            <div class="bg-gray-100 border-b border-gray-200 px-4 py-3 flex flex-wrap justify-between gap-4 text-xs">
              <div class="flex gap-6">
                <div>
                  <p class="text-gray-500 font-medium uppercase mb-0.5">Order Placed</p>
                  <p class="text-gray-900">${order.date}</p>
                </div>
                <div>
                  <p class="text-gray-500 font-medium uppercase mb-0.5">Total</p>
                  <p class="text-gray-900 font-semibold">₹${order.total || '---'}</p>
                </div>
              </div>
              <div class="text-right flex-grow">
                <p class="text-gray-500 font-medium uppercase mb-0.5">Order # ${order.orderId}</p>
                <a href="#" class="text-indigo-600 hover:text-indigo-800 hover:underline">View invoice</a>
              </div>
            </div>
            
            <div class="p-4 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
              <div class="flex gap-4">
                <div class="w-16 h-16 bg-gray-50 border border-gray-200 rounded p-1 shrink-0 flex items-center justify-center">
                   <img src="flooraqua.png" class="max-w-full max-h-full opacity-50 grayscale" alt="Item">
                </div>
                <div>
                  <h3 class="font-bold text-gray-900 text-sm md:text-base leading-snug mb-1">${order.item}</h3>
                  <p class="text-sm font-bold ${statusColor}">${statusBadge}</p>
                </div>
              </div>
              <div class="w-full sm:w-auto mt-2 sm:mt-0 flex shrink-0">
                 ${cancelBtn}
              </div>
            </div>
          </div>`;
      });
    }

    window.cancelOrder = async function(orderId) {
      if(confirm(`Cancel order #${orderId}?`)) {
        document.getElementById('ordersContainer').style.opacity = '0.5';
        try {
          const response = await fetch(GOOGLE_WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ action: "cancelOrder", email: window.currentUserEmail, orderId: orderId })
          });
          const data = await response.json();
          if (data.result === "success") {
            window.showToast("Order Cancelled");
            window.fetchUserOrders();
          }
        } catch (error) { alert("Error cancelling order."); }
        document.getElementById('ordersContainer').style.opacity = '1';
      }
    };

    // UTILITIES
    window.fetchProfileLocation = async function(pincode) {
      const loader = document.getElementById('profPincodeLoader');
      loader.classList.remove('hidden');
      try {
        const response = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
        const data = await response.json();
        if (data[0].Status === "Success") {
          document.getElementById('profDistrict').value = data[0].PostOffice[0].District;
          document.getElementById('profState').value = data[0].PostOffice[0].State;
          loader.classList.add('hidden');
        }
      } catch (e) { loader.classList.add('hidden'); }
    };

    window.showToast = function(msg) {
      const toast = document.getElementById('toastNotification');
      document.getElementById('toastMessage').innerText = msg;
      toast.classList.remove('opacity-0', 'translate-y-[-20px]');
      toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-20px]');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }
  </script>
</body>
</html>
