<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Log In | FloorAqua</title>
  <meta name="description" content="Log in to your FloorAqua account to manage your premium cleaning supplies orders.">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Smooth reveal animation */
    #loginContainer { opacity: 0; transform: translateY(15px); transition: all 0.6s ease-out; }
    #loginContainer.visible { opacity: 1; transform: translateY(0); }
    
    /* Subtle background glow effects */
    .bg-blob {
      position: absolute; width: 300px; height: 300px;
      background: linear-gradient(to right, #4f46e5, #3b82f6);
      border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 0;
    }
  </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen relative overflow-hidden font-sans">

  <div class="bg-blob top-[-10%] left-[-10%] hidden md:block"></div>
  <div class="bg-blob bottom-[-10%] right-[-10%] bg-blue-400 hidden md:block"></div>

  <header class="w-full p-4 md:p-6 relative z-10 flex justify-center md:justify-start">
    <a href="index.html" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 transition font-bold text-sm md:text-base group bg-white/80 backdrop-blur-md px-4 py-2 rounded-full shadow-sm border border-indigo-50">
      <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Back to Store
    </a>
  </header>

  <div class="flex-grow flex flex-col items-center justify-center p-4 relative z-10">
    <div id="loginContainer" class="w-full max-w-md flex flex-col items-center">
      
      <div class="text-center mb-6 md:mb-8">
        <div class="inline-block bg-white p-3 md:p-4 rounded-full shadow-lg mb-4 border border-gray-100">
          <img src="flooraqua.png" alt="FloorAqua Logo" class="w-12 h-12 md:w-14 md:h-14 object-contain">
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Welcome Back</h1>
        <p class="text-gray-500 text-sm md:text-base font-medium">Sign in to manage your orders securely.</p>
      </div>

      <div id="loader" class="flex flex-col items-center justify-center py-6">
        <svg class="animate-spin h-8 w-8 text-indigo-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-indigo-600 font-bold text-sm">Checking secure connection...</p>
      </div>

      <div id="login-box" class="w-full bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 hidden">
        <button id="googleSignInBtn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-indigo-100 hover:bg-indigo-50 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-indigo-100 active:scale-95 shadow-sm">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" alt="Google Logo">
          <span>Continue with Google</span>
        </button>
        <p id="errorMessage" class="text-red-500 text-sm text-center mt-4 hidden font-medium"></p>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    // 🔑 YOUR UNIQUE FLOORAQUA CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCx_gDD74ZnTeIhWHSG42ExK67fUQaNNQE",
      authDomain: "flooraqua-2e835.firebaseapp.com",
      projectId: "flooraqua-2e835",
      storageBucket: "flooraqua-2e835.firebasestorage.app",
      messagingSenderId: "591654459926",
      appId: "1:591654459926:web:1d9d8615ee4e71c39df337"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // UI Elements
    const loginContainer = document.getElementById('loginContainer');
    const loader = document.getElementById('loader');
    const loginBox = document.getElementById('login-box');
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const errorMessage = document.getElementById('errorMessage');

    // Trigger the slide-up animation on load
    window.addEventListener('load', () => {
      requestAnimationFrame(() => { loginContainer.classList.add('visible'); });
    });

    // Automatically check if the user is already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is logged in, redirect immediately
        window.location.replace("account.html");
      } else {
        // No user found, hide loader and show our custom login box
        loader.classList.add('hidden');
        loginBox.classList.remove('hidden');
      }
    });

    // The Magic "One-Click" Google Login Function
    googleSignInBtn.addEventListener('click', async () => {
      try {
        // Show loading state on button
        googleSignInBtn.innerHTML = `<svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Connecting...</span>`;
        googleSignInBtn.disabled = true;
        errorMessage.classList.add('hidden');

        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // 💾 Save data for your Google Sheets order form
        localStorage.setItem('customerName', user.displayName);
        localStorage.setItem('customerEmail', user.email);

        // 🚀 Direct to your shop (onAuthStateChanged will also catch this)
        window.location.href = "account.html";

      } catch (error) {
        console.error(error);
        
        // Reset button
        googleSignInBtn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" alt="Google Logo"> <span>Continue with Google</span>`;
        googleSignInBtn.disabled = false;
        
        // Show error message to user
        errorMessage.textContent = "Login failed: " + error.message;
        errorMessage.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
